<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具页</title>
  <link rel="stylesheet" href="element-plus/dist/index.css">
  <script src="vue/vue.global.prod.js"></script>
  <script src="element-plus/dist/index.full.min.js"></script>
</head>

<body>
  <div id="app">
    <el-tabs>
      <el-tab-pane label="json">
        <el-input style="margin: 15px 0px;" spellcheck="false" type="textarea" :rows="20" v-model="json_text">
        </el-input>
        <el-button type="primary" @click="json_format">格式化校验</el-button>
        <el-button type="primary" plain @click="json_compress">压缩</el-button>
      </el-tab-pane>
      <el-tab-pane label="时间戳">
        <div style="margin: 15px 0px;">
          <label style="width: 80px; display: inline-block;">时间戳</label>
          <el-input style="width: 180px;" clearable v-model="ts_second"></el-input>
          <el-button type="primary" style="margin: 0px 15px;" @click="second_to_time">转换</el-button>
          <el-input style="width: 180px;" v-model="ts_time"></el-input>
        </div>
        <div style="margin: 15px 0px;">
          <label style="width: 80px; display: inline-block;">时间</label>
          <el-input style="width: 180px;" clearable v-model="ts_str"></el-input>
          <el-button type="primary" style="margin: 0px 15px;" plain @click="time_to_second">转换</el-button>
          <el-input style="width: 180px;" v-model="ts_value"></el-input>
        </div>
      </el-tab-pane>
      <el-tab-pane label="正则">
        <el-row style="margin: 15px 0px;">
          <el-col :span="12">
            <el-input placeholder="正则" v-model="re_pattern"></el-input>
          </el-col>
          <el-col :span="12">
            <el-button style="margin: 0px 15px;" type="primary" @click="re_match">匹配</el-button>
            <el-checkbox style="margin: 0px 15px;" v-model="re_g">匹配所有</el-checkbox>
            <el-checkbox style="margin: 0px 15px;" v-model="re_i">不区分大小写</el-checkbox>
          </el-col>
        </el-row>
        <el-input style="margin: 15px 0px;" spellcheck="false" type="textarea" :rows="15" placeholder="待匹配文本"
          v-model="re_text"></el-input>
        <el-input style="margin: 15px 0px;" spellcheck="false" type="textarea" :rows="12" placeholder="匹配结果"
          v-model="re_result"></el-input>
      </el-tab-pane>
      <el-tab-pane label="编解码">
        <el-tabs tab-position="left" style="margin-top: 15px;">
          <el-tab-pane label="base64">
            <el-row :gutter="15">
              <el-col :span="12">
                <el-input spellcheck="false" type="textarea" :rows="15" v-model="base64_text"></el-input>
              </el-col>
              <el-col :span="12">
                <el-input spellcheck="false" type="textarea" :rows="15" v-model="base64_result"></el-input>
              </el-col>
            </el-row>
            <div style="float: right; margin-top: 15px;">
              <el-button type="primary" plain @click="base64_encode">编码</el-button>
              <el-button type="primary" @click="base64_decode">解码</el-button>
            </div>
          </el-tab-pane>
          <el-tab-pane label="urlencode">
            <el-row :gutter="15">
              <el-col :span="12">
                <el-input spellcheck="false" type="textarea" :rows="15" v-model="url_text"></el-input>
              </el-col>
              <el-col :span="12">
                <el-input spellcheck="false" type="textarea" :rows="15" v-model="url_result"></el-input>
              </el-col>
            </el-row>
            <div style="float: right; margin-top: 15px;">
              <el-button type="primary" plain @click="url_encode">编码</el-button>
              <el-button type="primary" @click="url_decode">解码</el-button>
            </div>
          </el-tab-pane>
          <el-tab-pane label="unicode">
            <el-row :gutter="15">
              <el-col :span="12">
                <el-input spellcheck="false" type="textarea" :rows="15" v-model="unicode_text"></el-input>
              </el-col>
              <el-col :span="12">
                <el-input spellcheck="false" type="textarea" :rows="15" v-model="unicode_result"></el-input>
              </el-col>
            </el-row>
            <div style="float: right; margin-top: 15px;">
              <el-button type="primary" plain @click="unicode_encode">转Unicode</el-button>
              <el-button type="primary" @click="unicode_decode">转中文</el-button>
            </div>
          </el-tab-pane>
        </el-tabs>
      </el-tab-pane>
      <el-tab-pane label="密码生成器">
        <div style="margin: 15px 0px;">
          <label style="width: 50px; display: inline-block;">长度</label>
          <el-input style="width: 60px;" v-model="password_len"></el-input>
          <el-button type="primary" style="margin: 0px 15px;" @click="password_gen">生成</el-button>
          <el-input style="width: 350px;" v-model="password_result"></el-input>
        </div>
      </el-tab-pane>
    </el-tabs>
  </div>

  <script type="module">
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        // JSON 工具
        const json_text = ref(null);

        // 时间戳工具
        const ts_second = ref(null);
        const ts_time = ref(null);
        const ts_str = ref(null);
        const ts_value = ref(null);

        // 正则工具
        const re_pattern = ref(null);
        const re_g = ref(true);
        const re_i = ref(false);
        const re_text = ref(null);
        const re_result = ref(null);

        // 编解码工具
        const base64_text = ref(null);
        const base64_result = ref(null);
        const url_text = ref(null);
        const url_result = ref(null);
        const unicode_text = ref(null);
        const unicode_result = ref(null);

        // 密码生成器
        const password_len = ref(32);
        const password_result = ref(null);

        // 初始化
        onMounted(() => {
          const now = new Date();
          ts_second.value = parseInt(now.getTime() / 1000);
          ts_str.value = strftime(now);
        });

        // JSON 方法
        function json_format() {
          if (!json_text.value) return;
          try {
            const json = JSON.parse(json_text.value);
            json_text.value = JSON.stringify(json, null, 4);
            ElementPlus.ElMessage.success("正确的json");
          } catch (e) {
            ElementPlus.ElMessage.error(e.message);
          }
        }

        function json_compress() {
          if (!json_text.value) return;
          try {
            const json = JSON.parse(json_text.value);
            json_text.value = JSON.stringify(json);
          } catch (e) {
            ElementPlus.ElMessage.error(e.message);
          }
        }

        // 时间方法
        function strftime(val) {
          const f = v => v < 10 ? `0${v}` : v.toString();
          return `${val.getFullYear()}-${f(val.getMonth() + 1)}-${f(val.getDate())} ${f(val.getHours())}:${f(val.getMinutes())}:${f(val.getSeconds())}`;
        }

        function second_to_time() {
          if (!ts_second.value) {
            ts_time.value = null;
            return;
          }
          const value = new Date(ts_second.value * 1000);
          if (isNaN(value.getTime())) {
            ts_time.value = null;
            ElementPlus.ElMessage.error("错误的时间戳");
          } else {
            ts_time.value = strftime(value);
          }
        }

        function time_to_second() {
          if (!ts_str.value) {
            ts_value.value = null;
            return;
          }
          const value = new Date(ts_str.value);
          if (isNaN(value.getTime())) {
            ts_value.value = null;
            ElementPlus.ElMessage.error("错误的时间");
          } else {
            ts_value.value = value.getTime() / 1000;
          }
        }

        // 正则方法
        function re_match() {
          if (!re_pattern.value || !re_text.value) return;
          let flag = "";
          if (re_i.value) flag += "i";
          if (re_g.value) flag += "g";
          const re = new RegExp(re_pattern.value, flag);
          const result = re_text.value.match(re);
          if (!result) {
            re_result.value = null;
          } else {
            re_result.value = result.join('\n');
          }
        }

        // Base64 方法
        function base64_encode() {
          if (!base64_text.value) return;
          try {
            base64_result.value = btoa(base64_text.value);
          } catch (e) {
            base64_result.value = null;
            ElementPlus.ElMessage.error(e.message);
          }
        }

        function base64_decode() {
          try {
            base64_result.value = atob(base64_text.value);
          } catch (e) {
            base64_result.value = null;
            ElementPlus.ElMessage.error(e.message);
          }
        }

        // URL 编解码方法
        function url_encode() {
          if (!url_text.value) return;
          try {
            url_result.value = encodeURIComponent(url_text.value);
          } catch (e) {
            url_result.value = null;
            ElementPlus.ElMessage.error(e.message);
          }
        }

        function url_decode() {
          try {
            url_result.value = decodeURIComponent(url_text.value);
          } catch (e) {
            url_result.value = null;
            ElementPlus.ElMessage.error(e.message);
          }
        }

        // Unicode 编解码方法
        function unicode_encode() {
          if (!unicode_text.value) return;
          try {
            unicode_result.value = unicode_text.value.split('').map(char => {
              const code = char.charCodeAt(0);
              return code > 127 ? '\\u' + code.toString(16).padStart(4, '0') : char;
            }).join('');
          } catch (e) {
            unicode_result.value = null;
            ElementPlus.ElMessage.error(e.message);
          }
        }

        function unicode_decode() {
          if (!unicode_text.value) return;
          try {
            unicode_result.value = unicode_text.value.replace(/\\u([\da-fA-F]{4})/g, (match, hex) => {
              return String.fromCharCode(parseInt(hex, 16));
            });
          } catch (e) {
            unicode_result.value = null;
            ElementPlus.ElMessage.error(e.message);
          }
        }

        // 密码生成方法
        function password_gen() {
          const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]\:;?><,./-=";
          let password = "";
          for (let i = 0; i < password_len.value; i++) {
            const randomIndex = Math.floor(Math.random() * charset.length);
            password += charset[randomIndex];
          }
          password_result.value = password;
        }

        return {
          // 数据
          json_text,
          ts_second,
          ts_time,
          ts_str,
          ts_value,
          re_pattern,
          re_g,
          re_i,
          re_text,
          re_result,
          base64_text,
          base64_result,
          url_text,
          url_result,
          unicode_text,
          unicode_result,
          password_len,
          password_result,
          // 方法
          json_format,
          json_compress,
          second_to_time,
          time_to_second,
          re_match,
          base64_encode,
          base64_decode,
          url_encode,
          url_decode,
          unicode_encode,
          unicode_decode,
          password_gen
        };
      }
    }).use(ElementPlus).mount('#app');
  </script>

</body>

</html>
